<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Back in Print Admin</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="brand-lockup">
        <img class="brand-logo" src="/logo/Main_Logo.PNG" alt="Back in Print logo">
        <p class="eyebrow">Product Admin</p>
        <h1>Back in Print</h1>
      </div>
      <a class="admin-link" href="/">Gallery</a>
    </header>

    <main class="shell">
      <form id="adminLogin" class="admin-login">
        <label>
          <span>Password</span>
          <input id="adminPassword" type="password" autocomplete="current-password">
        </label>
        <button type="submit">Enter</button>
        <span id="loginStatus" class="save-state" role="status"></span>
      </form>
      <div id="adminContent" hidden>
        <section id="adminList" class="admin-list" aria-live="polite"></section>
        <p id="adminEmpty" class="empty-state" hidden>No photos found in 01_ITEM_PHOTOS.</p>
      </div>
    </main>

    <script src="/js/admin.js"></script>
  </body>
</html>
