<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Back in Print Admin</title>
    <link rel="stylesheet" href="public/styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="brand-lockup">
        <img class="brand-logo" src="02_Logo/Main_Logo.PNG" alt="Back in Print logo">
        <p class="eyebrow">Product Admin</p>
        <h1>Back in Print</h1>
      </div>
      <a class="admin-link" href="index.html">Gallery</a>
    </header>

    <main class="shell">
      <form id="adminLogin" class="admin-login">
        <label>
          <span>Password</span>
          <input id="adminPassword" type="password" autocomplete="current-password">
        </label>
        <button type="submit">Enter</button>
        <span id="loginStatus" class="save-state" role="status"></span>
      </form>
      <div id="adminContent" hidden>
        <div class="toolbar">
          <button id="exportCsv" type="button">Export CSV</button>
          <label class="file-button">
            Import CSV
            <input id="importCsv" type="file" accept=".csv,text/csv">
          </label>
          <span id="adminStatus" class="save-state" role="status"></span>
        </div>
        <section id="adminList" class="admin-list" aria-live="polite"></section>
        <p id="adminEmpty" class="empty-state" hidden>No photos found in 01_ITEM_PHOTOS.</p>
      </div>
    </main>

    <script src="public/js/photo-manifest.js"></script>
    <script src="public/js/products-data.js"></script>
    <script src="public/js/static-store.js"></script>
    <script src="public/js/static-admin.js"></script>
  </body>
</html>
